name: Prepare Release
run-name: Prepare release ${{ github.ref_name }}

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

env:
  BUILD_VERSION: ${{ github.ref_name }}

jobs:
  build-release-archive:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            label: linux-arm64
          - runner: macos-14
            label: darwin-arm64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release archive
        run: make publish-all version=${{ env.BUILD_VERSION }}

      - name: Rename unsigned macOS archive
        if: ${{ startsWith(matrix.label, 'darwin-') }}
        run: |
          set -euo pipefail
          case "${{ matrix.label }}" in
            darwin-arm64)
              mv .out/pgpackage-${BUILD_VERSION}-darwin-arm64.zip .out/pgpackage-${BUILD_VERSION}-darwin-arm64-unsigned.zip
              ;;
          esac

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: .out/*.zip
          if-no-files-found: error
          include-hidden-files: true

  create-draft-release:
    runs-on: ubuntu-latest
    needs: build-release-archive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: .out

      - name: Extract release notes from changelog
        shell: bash
        run: |
          ./.github/scripts/extract-release-notes.sh "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/release-notes.md"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            .out/*.zip
